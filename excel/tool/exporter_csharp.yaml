#Excel导入目录(excel所在目录)
DataImportPath: "./../../excel"

#数据导出目录
DataExportPath: "./../../../cshap_client/cshap_client/cfgdata"

#proto所在目录
ProtoPath: "./../../proto"

#需要解析的proto文件
ProtoFiles:
  - "cfg.proto"

#可选项:导出md5文件完整路径
Md5ExportPath: "./../../../cshap_client/cshap_client/cfgdata/md5.json"

#代码模板目录
CodeTemplatePath: "./"

#代码模板
CodeTemplateFiles:
  - "DataMgr.cs.template"

#代码导出目录 NOTE:和CodeTemplateFiles的数量要一致
CodeExportFiles:
  - "./../../../cshap_client/cshap_client/cfg/DataMgr.cs"

#导出分组标记 c s cs
ExportGroup: "c"

#默认的分组标记
DefaultGroup: "cs"

#导出总表的文件名
ExportAllExcelFile: "all.xlsx"

#导出总表的sheet名
ExportAllSheet: "ExportCfg"
